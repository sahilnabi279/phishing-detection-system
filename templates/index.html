<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        .safe {
            color: green;
            font-weight: bold;
        }
        .phishing {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Phishing Detection System</h2>

    <input type="text" id="url" placeholder="Enter URL">
    <br>
    <button onclick="check()">Check</button>

    <h3 id="result"></h3>
    <ul id="reasons"></ul>
</div>

<script>
function check() {
    let url = document.getElementById("url").value;

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url})
    })
    .then(res => res.json())
    .then(data => {
        let resultText = data.result;
        let resultElement = document.getElementById("result");

        resultElement.innerText = resultText;

       if (resultText.trim() === "Phishing") {
            resultElement.className = "phishing";
        } else {
            resultElement.className = "safe";
        }

        let reasonsList = document.getElementById("reasons");
        reasonsList.innerHTML = "";

        if (data.reasons) {
            data.reasons.forEach(r => {
                let li = document.createElement("li");
                li.innerText = r;
                reasonsList.appendChild(li);
            });
        }
    });
}
</script>

</body>
</html>
